# SlidesPro — stack completo en Docker
#
# Levanta la app entera (Next.js + Postgres + Redis + pgAdmin) con un solo
# comando. Puertos elegidos para no chocar con tus otros stacks
# (gema en 5432/5050).
#
# Uso:
#   docker compose up -d --build      # build + arrancar todo
#   docker compose logs -f app        # logs de la app
#   docker compose ps                 # estado
#   docker compose down               # detener
#   docker compose down -v            # detener + borrar volúmenes (reset DB)
#
# Servicios y puertos en host:
#   App      → http://localhost:3000
#   Postgres → localhost:5434  (user: slidespro, db: slidespro)
#   Redis    → localhost:6380
#   pgAdmin  → http://localhost:5052  (admin@slidespro.local / admin)
#
# Migraciones y seed corren automáticamente al arrancar la app.
# Si prefieres correr la app en host (hot reload más rápido), arranca solo
# los servicios:
#   docker compose up -d postgres redis pgadmin
# y luego `npm run dev` en host.

name: slidespro

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: slidespro-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://slidespro:slidespro@postgres:5432/slidespro
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
    env_file:
      - path: .env.local
        required: false
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./package.json:/app/package.json
      - ./eslint.config.mjs:/app/eslint.config.mjs
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - app_node_modules:/app/node_modules
      - app_next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma migrate deploy &&
        npx tsx prisma/seed.ts || true;
        npm run dev
      "

  postgres:
    image: postgres:16-alpine
    container_name: slidespro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: slidespro
      POSTGRES_PASSWORD: slidespro
      POSTGRES_DB: slidespro
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slidespro -d slidespro"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: slidespro-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: slidespro-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@slidespro.app
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5052:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  app_node_modules:
  app_next_cache:
